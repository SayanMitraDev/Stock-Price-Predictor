<!DOCTYPE html>
<html>
<head>
    <title>Stock Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

    <div class="bg-gray-800 p-8 rounded-xl shadow-xl w-96">

        <h1 class="text-2xl font-bold mb-4">📈 Stock Price Predictor</h1>

        <form method="POST">
            <input 
                type="text" 
                name="ticker" 
                placeholder="Enter ticker (AAPL, TSLA...)"
                class="w-full p-2 rounded text-black"
            />

            <button 
                type="submit"
                class="mt-4 w-full bg-blue-500 hover:bg-blue-600 p-2 rounded"
            >
                Predict
            </button>
        </form>

        {% if prediction %}
        <div class="mt-6 bg-green-600 p-3 rounded">
            <p class="text-lg">Prediction for <b>{{ ticker }}</b></p>
            <p class="text-xl font-bold">₹ {{ prediction }}</p>
        </div>
        {% endif %}

    </div>

</body>
</html>
